# non-CoT arm, 0.5B student. Identical to cot_0.5b.yaml except the dataset.
base_model: Qwen/Qwen2.5-0.5B
dataset: data/sft/nocot.jsonl
output_dir: outputs/nocot_0.5b
mode: nocot
max_seq_length: 4096
epochs: 2.0
batch_size: 4
grad_accum: 4
learning_rate: 2.0e-4
val_ratio: 0.05
train_on_responses_only: true
